name: Tests & Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint
        continue-on-error: false

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build
        run: npm run build
        env:
          VITE_GITLAB_API_URL: https://gitlab.com/api/v4
          VITE_GITLAB_TOKEN: test_token
          VITE_GITLAB_PROJECT_ID: 79598942
          VITE_AUTO_REFRESH_ENABLED: false

      - name: Check bundle size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "📦 Bundle size: $SIZE"
          
          # Check if size exceeds 500KB
          SIZE_KB=$(du -sk dist/ | cut -f1)
          if [ $SIZE_KB -gt 500 ]; then
            echo "⚠️  Warning: Bundle size exceeds 500KB (Current: ${SIZE_KB}KB)"
          fi

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Test environment variables
        run: |
          if ! grep -q "VITE_" .env.example 2>/dev/null; then
            echo "⚠️  Warning: .env.example not found"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dist-${{ matrix.node-version }}
          path: dist/
          retention-days: 5

      - name: Report results
        if: always()
        run: |
          echo "✅ Test Results"
          echo "==============="
          echo "Node version: ${{ matrix.node-version }}"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Notify test results
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            🧪 ASRO Frontend Tests
            Node: ${{ matrix.node-version }}
            Status: ${{ job.status }}
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
